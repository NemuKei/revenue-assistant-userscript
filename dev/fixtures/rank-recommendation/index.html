<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>RAU 判断ワークスペース fixture</title>
    </head>
    <body>
        <header data-ra-fixture-app-header>
            <div data-ra-fixture-brand>Revenue Assistant</div>
            <nav data-ra-fixture-nav aria-label="主な画面">
                <span>ダッシュボード</span>
                <span>カレンダー</span>
                <span>Analyze</span>
                <span>設定</span>
            </nav>
        </header>
        <main data-ra-fixture-shell>
            <section data-ra-fixture-native-parent data-ra-rank-recommendation-workspace-layout="stacked">
                <section data-ra-fixture-toolbar>
                    <div>
                        <h1>料金調整の判断ワークスペース</h1>
                        <p>3か月カレンダーと既存操作が同じ親にいる実画面相当の合成 fixture。黒い標準数値と青い「団n」は既存表記のままです。</p>
                    </div>
                    <div data-ra-fixture-toolbar-actions>
                        <div data-testid="segmented-control" aria-label="表示単位">
                            <button type="button">月</button>
                            <button type="button">週</button>
                        </div>
                        <label>
                            <span>確認 state</span>
                            <select id="rank-fixture-state"></select>
                        </label>
                    </div>
                </section>

                <div data-ra-fixture-calendar-strip data-ra-rank-recommendation-calendar aria-label="2026年7月から9月のカレンダー"></div>

                <section id="rank-fixture-root" data-ra-rank-recommendation-list></section>
                <section id="rank-fixture-detail" data-ra-rank-recommendation-detail></section>

                <section data-ra-sales-setting-warm-cache-month-controls data-ra-fixture-native-control>
                    <strong>取得対象月</strong>
                    <button type="button">7月</button>
                    <button type="button">8月</button>
                    <button type="button">9月</button>
                </section>
                <div data-ra-sales-setting-warm-cache-inline-status data-ra-fixture-native-status>取得済みデータを表示中</div>
                <footer data-ra-fixture-native-footer>Revenue Assistant 標準フッター領域</footer>
            </section>
        </main>
        <script type="module" src="/src/dev/rankRecommendationFixture.ts"></script>
    </body>
</html>
