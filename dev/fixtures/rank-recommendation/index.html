<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>RAU Rank Recommendation Fixture</title>
    </head>
    <body>
        <main data-ra-fixture-shell>
            <header data-ra-fixture-header>
                <div>
                    <h1>料金調整候補 fixture</h1>
                    <p>Revenue Assistant へ接続しない合成データ確認画面</p>
                </div>
                <label>
                    <span>表示 state</span>
                    <select id="rank-fixture-state"></select>
                </label>
            </header>
            <section id="rank-fixture-root" data-ra-rank-recommendation-list></section>
            <section id="rank-fixture-secondary-root" data-ra-fixture-secondary></section>
            <section aria-label="UI regression gallery" data-ra-fixture-gallery>
                <h2>UI regression gallery</h2>
                <div id="rank-fixture-gallery-root" data-ra-fixture-gallery-grid></div>
            </section>
        </main>
        <script type="module" src="/src/dev/rankRecommendationFixture.ts"></script>
    </body>
</html>
