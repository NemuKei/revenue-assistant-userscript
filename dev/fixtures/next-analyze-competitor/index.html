<!doctype html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU Next competitor history fixture</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #f3f5f7; color: #263a4d; font-family: "Segoe UI", "Yu Gothic UI", Meiryo, sans-serif; }
        header { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; min-height: 50px; padding: 8px 18px; background: #2478b5; color: #fff; }
        header strong { margin-right: auto; }
        header button { min-height: 38px; border: 1px solid rgba(255,255,255,.7); border-radius: 6px; background: transparent; color: #fff; font: inherit; }
        main { padding: 20px 24px 60px; }
        [data-mock-tabs] { display: flex; gap: 2px; margin-bottom: 16px; }
        [data-mock-tabs] button { min-height: 42px; padding: 8px 18px; border: 1px solid #c5d0d9; background: #fff; color: inherit; font: inherit; }
        [data-mock-competitor-section] { min-width: 0; padding: 18px 0 60px; }
        [data-mock-filter] { width: min(760px, 100%); height: 58px; border: 1px solid #d3dce4; border-radius: 8px; background: #fff; }
        [data-testid="competitor-price-tax-included-text"] { margin-top: 10px; color: #5d7182; font-size: 12px; }
        [data-mock-native-table] { display: grid; grid-template-columns: repeat(5, minmax(100px, 1fr)); width: 100%; min-height: 230px; margin-top: 8px; border: 1px solid #d2dce4; border-radius: 7px; background: #fff; overflow: hidden; }
        [data-mock-native-table] div { padding: 12px; border-right: 1px solid #e0e6eb; }
        [data-mock-native-table] strong { display: block; margin-bottom: 10px; }
        [data-mock-native-table] span { display: block; height: 26px; margin: 5px 0; border-radius: 4px; background: #eef2f5; }
        [data-mock-away] { padding: 26px; border: 1px solid #d2dce4; border-radius: 8px; background: #fff; }
        [hidden] { display: none !important; }
        @media (max-width: 680px) {
            main { min-width: 810px; padding: 14px 16px 40px; }
            [data-mock-competitor-section] { width: 810px; }
        }
    </style>
</head>
<body>
    <header>
        <strong>Revenue Assistant Analyze mock</strong>
        <button type="button">施設A（mock）</button>
        <button type="button" data-mock-show>競合価格を表示</button>
        <button type="button" data-mock-hide>他タブへ</button>
        <button type="button" data-mock-route-away>別画面へ</button>
        <button type="button" data-mock-route-back>Analyzeへ戻る</button>
    </header>
    <main>
        <div data-mock-tabs role="tablist" aria-label="Analyze tabs">
            <button type="button" role="tab">販売設定</button>
            <button type="button" role="tab" data-testid="tab-bookingCurve">ブッキングカーブ</button>
            <button type="button" role="tab" data-testid="tab-competitorPrice" aria-selected="true">競合価格</button>
            <button type="button" role="tab" data-testid="tab-priceTrends">価格推移</button>
        </div>
        <section data-mock-competitor-section>
            <div data-mock-filter aria-label="標準の競合価格絞り込み"></div>
            <div data-testid="competitor-price-tax-included-text">標準表の価格は税込表示（合成画面）</div>
            <div data-mock-native-table aria-label="標準の競合価格表（合成画面）">
                <div><strong>条件</strong><span></span><span></span><span></span></div>
                <div><strong>自社</strong><span></span><span></span><span></span></div>
                <div><strong>競合A</strong><span></span><span></span><span></span></div>
                <div><strong>競合B</strong><span></span><span></span><span></span></div>
                <div><strong>競合C</strong><span></span><span></span><span></span></div>
            </div>
        </section>
        <section data-mock-away hidden>別画面の合成表示</section>
    </main>
    <script>
        (() => {
            const content = document.querySelector("[data-mock-competitor-section]");
            const away = document.querySelector("[data-mock-away]");
            document.querySelector("[data-mock-show]").addEventListener("click", () => { content.hidden = false; });
            document.querySelector("[data-mock-hide]").addEventListener("click", () => { content.hidden = true; });
            document.querySelector("[data-mock-route-away]").addEventListener("click", () => {
                history.pushState({}, "", "/monthly-progress/2026-08");
                content.hidden = true;
                away.hidden = false;
                dispatchEvent(new PopStateEvent("popstate"));
            });
            document.querySelector("[data-mock-route-back]").addEventListener("click", () => {
                history.pushState({}, "", "/dev/fixtures/next-analyze-competitor/");
                away.hidden = true;
                content.hidden = false;
                dispatchEvent(new PopStateEvent("popstate"));
            });
        })();
    </script>
    <script type="module" src="/src/next/dev/analyzeCompetitorFixtureEntry.ts"></script>
</body>
</html>
