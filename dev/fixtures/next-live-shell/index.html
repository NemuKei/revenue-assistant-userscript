<!doctype html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU Next live shell fixture</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #f4f6f8; color: #263a4d; font-family: "Segoe UI", "Yu Gothic UI", Meiryo, sans-serif; }
        [data-mock-header] { display: flex; align-items: center; gap: 10px; min-height: 50px; padding: 7px 20px; background: #2378b8; color: #fff; }
        [data-mock-header] strong { margin-right: auto; }
        [data-mock-header] button { min-height: 36px; border: 1px solid rgba(255,255,255,.7); border-radius: 6px; background: transparent; color: #fff; font: inherit; font-weight: 700; }
        [data-mock-native-status] { min-width: 150px; font-size: 12px; font-weight: 700; }
        [data-mock-ra-shell] { min-height: 760px; }
        [data-testid="segmented-control"] { display: flex; gap: 1px; padding: 12px 24px; }
        [data-testid="segmented-control"] button { min-height: 42px; padding: 8px 22px; border: 1px solid #ced8e1; background: #fff; }
        [data-mock-calendar-strip] { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; padding: 0 24px 24px; }
        [data-testid="monthly-calendar"] { overflow: hidden; border: 1px solid #d4dde5; border-radius: 8px; background: #fff; }
        [data-mock-month-heading] { margin: 0; padding: 14px; font-size: 17px; }
        [data-mock-calendar-grid] { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); }
        [data-mock-calendar-grid] > span { min-height: 86px; border-top: 1px solid #e1e6eb; border-right: 1px solid #e1e6eb; }
        a[data-testid^="calendar-date-"] { position: relative; display: grid; align-content: space-between; min-height: 86px; padding: 7px; border-top: 1px solid #e1e6eb; border-right: 1px solid #e1e6eb; background: #fff; color: inherit; cursor: pointer; }
        a[data-testid^="calendar-date-"]:focus-visible { outline: 3px solid #d98200; outline-offset: -3px; }
        [data-mock-day] { font-size: 12px; }
        [data-testid^="room-num-"] { justify-self: end; font-size: 15px; font-weight: 800; }
        @media (max-width: 900px) { [data-mock-calendar-strip] { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="root">
        <header data-mock-header>
            <strong>Revenue Assistant mock / read-only</strong>
            <span data-mock-native-status>通常遷移 0回</span>
            <button type="button" data-mock-rerender>カレンダーを再描画</button>
            <button type="button" data-mock-classic>Classic markerを追加</button>
        </header>
        <main>
            <section data-mock-ra-shell>
                <div data-testid="segmented-control">
                    <button type="button">おすすめ</button>
                    <button type="button">1日前増減</button>
                    <button type="button">自社前年比</button>
                    <button type="button">料金ランク</button>
                </div>
                <div data-mock-calendar-host></div>
            </section>
        </main>
    </div>
    <script>
        (() => {
            let nativeNavigationCount = 0;
            const months = [[2026, 7, 31], [2026, 8, 31], [2026, 9, 30]];
            const status = document.querySelector("[data-mock-native-status]");
            const renderCalendar = () => {
                const strip = document.createElement("div");
                strip.setAttribute("data-mock-calendar-strip", "");
                for (const [year, month, days] of months) {
                    const calendar = document.createElement("section");
                    calendar.setAttribute("data-testid", "monthly-calendar");
                    const heading = document.createElement("h2");
                    heading.setAttribute("data-mock-month-heading", "");
                    heading.textContent = `${year}年${month}月`;
                    const grid = document.createElement("div");
                    grid.setAttribute("data-mock-calendar-grid", "");
                    const firstWeekday = new Date(Date.UTC(year, month - 1, 1)).getUTCDay();
                    for (let blank = 0; blank < firstWeekday; blank += 1) {
                        grid.append(document.createElement("span"));
                    }
                    for (let day = 1; day <= days; day += 1) {
                        const stayDate = `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
                        const anchor = document.createElement("a");
                        anchor.setAttribute("data-testid", `calendar-date-${stayDate}`);
                        const dayLabel = document.createElement("span");
                        dayLabel.setAttribute("data-mock-day", "");
                        dayLabel.textContent = String(day);
                        const roomNumber = document.createElement("strong");
                        roomNumber.setAttribute("data-testid", `room-num-${stayDate}`);
                        roomNumber.textContent = String(40 + ((month * 13 + day * 7) % 110));
                        anchor.append(dayLabel, roomNumber);
                        anchor.addEventListener("click", () => {
                            nativeNavigationCount += 1;
                            status.textContent = `通常遷移 ${nativeNavigationCount}回 / ${stayDate}`;
                        });
                        grid.append(anchor);
                    }
                    calendar.append(heading, grid);
                    strip.append(calendar);
                }
                document.querySelector("[data-mock-calendar-host]").replaceChildren(strip);
            };
            renderCalendar();
            document.querySelector("[data-mock-rerender]").addEventListener("click", renderCalendar);
            document.querySelector("[data-mock-classic]").addEventListener("click", () => {
                const sentinel = document.createElement("span");
                sentinel.setAttribute("data-ra-group-room-toggle", "");
                document.querySelector("#root").append(sentinel);
            });
        })();
    </script>
    <script type="module" src="/src/next/entry.ts"></script>
</body>
</html>
