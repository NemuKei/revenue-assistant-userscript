name: Validate Main

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
    push:
        branches:
            - main
        paths:
            - ".github/classic-publication-baseline.json"
            - ".github/workflows/**"
            - "dev/fixtures/**"
            - "eslint.config.mjs"
            - "package-lock.json"
            - "package.json"
            - "scripts/**"
            - "src/**"
            - "tsconfig.json"
            - "userscript.config.mjs"
            - "userscript.next.config.mjs"
            - "vite.fixture.config.mjs"
            - "vite.next-fixture.config.mjs"
            - "vite.next-userscript.config.mjs"
            - "vite.userscript.config.mjs"

permissions:
    contents: read

concurrency:
    group: validate-main
    cancel-in-progress: true

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup Node.js
              uses: actions/setup-node@v7
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Validate Classic and shared source
              run: npm run check

            - name: Validate Next
              run: npm run check:next

            - name: Validate Classic publication boundary
              run: npm run check:classic-publication

            - name: Validate fixture UI markers
              run: |
                  npm run build:vite:fixture
                  npm run check:fixture-markers
