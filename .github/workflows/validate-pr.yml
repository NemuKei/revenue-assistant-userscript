name: Validate Pull Request

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
    pull_request:
        branches:
            - main
    merge_group:

permissions:
    contents: read

concurrency:
    group: validate-pr-${{ github.event.pull_request.number || github.sha }}
    cancel-in-progress: true

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup Node.js
              uses: actions/setup-node@v7
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Validate and build
              run: npm run check

            - name: Validate Next
              run: npm run check:next

            - name: Validate Classic publication boundary
              run: npm run check:classic-publication

            - name: Validate fixture UI markers
              run: |
                  npm run build:vite:fixture
                  npm run check:fixture-markers
